<div class="home-container">
    <div class="content">
        <img class="logo" src="assets/images/Logo.png" alt="Logo" />
        <h1>LookSafe</h1>
        <p class="subtitle">Sistema Inteligente de Monitoreo</p>
        <p class="description">
            Utiliza tecnología IA para detectar en tiempo real signos de fatiga
            en conductores y mejorar la seguridad en carretera.
        </p>

        <div class="button-group">
            <button class="btn-primary btn-iniciar" (click)="onIniciarDeteccion()">
                <div class="icon-container">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <circle cx="12" cy="12" r="1"></circle>
                        <path d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                </div>
                <span>INICIAR DETECCIÓN</span>
            </button>

            <button class="btn-primary btn-historial" (click)="onVerHistorial()">
                <div class="icon-container">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <polyline points="12 3 20 7.5 20 16.5 12 21 4 16.5 4 7.5 12 3"></polyline>
                        <polyline points="12 12 20 7.5"></polyline>
                        <polyline points="12 21 12 12"></polyline>
                        <polyline points="4 7.5 12 12"></polyline>
                    </svg>
                </div>
                <span>VER HISTORIAL</span>
            </button>
        </div>
    </div>
</div>
